version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gritio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gritio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: src/api
      dockerfile: Dockerfile
    container_name: gritio-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gritio_db
      NODE_ENV: development
      JWT_SECRET: dev-secret-key-change-in-production
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-your-domain.auth0.com}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-your-client-id}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-your-client-secret}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: gritio-frontend
    environment:
      NODE_ENV: development
    ports:
      - "5173:3000"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: gritio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ENHANCED_HAM_SETTINGS: "False"
      SCRIPT_NAME: /pgadmin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
